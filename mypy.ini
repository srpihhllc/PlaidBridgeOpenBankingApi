# /home/srpihhllc/PlaidBridgeOpenBankingApi/mypy.ini

[mypy]
python_version = 3.12
files = app

# Don't fail on missing third-party stubs (legacy codebases)
ignore_missing_imports = True
# Follow imports normally (so mypy still checks local package code)
follow_imports = normal

# Be permissive about untyped defs/calls while we incrementally add types
allow_untyped_calls = True
allow_untyped_defs = True
check_untyped_defs = False

# Helpful diagnostics to track progress
warn_unused_ignores = True
warn_return_any = True
show_error_codes = True
pretty = True

# Presentation options (reduce noisy context/column output)
show_error_context = False
show_column_numbers = False

# Keep default implicit optional behavior
no_implicit_optional = False
disallow_untyped_defs = False

# Per-module overrides: be stricter for the app package itself
[mypy-app.*]
# For the app package we want missing third-party stubs to be reported,
# so we can focus on fixing actual typing problems in our code.
ignore_missing_imports = False
allow_untyped_defs = True
allow_untyped_calls = True
check_untyped_defs = False



