# /home/srpihhllc/PlaidBridgeOpenBankingApi/uwsgi.ini

[uwsgi]

# Master process & concurrency
master = true
processes = 4
threads = 2

# Socket for communication (consider env-driven path for portability)
socket = /var/sockets/srpihhllc.pythonanywhere.com/socket

# Clean up after exit
vacuum = true

# Ensure graceful shutdowns
die-on-term = true

# Optional: expose stats socket for monitoring
# stats = /tmp/uwsgi.stats.sock

# WSGI entrypoint
module = srpihhllc_pythonanywhere_com_wsgi
callable = application

