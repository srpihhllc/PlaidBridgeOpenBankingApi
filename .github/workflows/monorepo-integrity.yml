name: Monorepo Integrity\n\non:\n  push:\n    branches: [ main, docs/infrastructure-upgrade ]\n  pull_request:\n    branches: [ main, docs/infrastructure-upgrade ]\n\njobs:\n  monorepo-integrity:\n    runs-on: ubuntu-latest\n\n    steps:\n      - name: Checkout\n        uses: actions/checkout@v4\n\n      - name: Verify repo structure\n        run: |\n          test -d app\n          test -d mobile-app\n          test -d docs\n          test -f README.md\n          test -f docs/10-openapi.yaml\n          test -f docs/05-developer-onboarding.md\n          test -f docs/06-ci-cd-pipeline.md\n          test -f docs/07-operator-handbook.md\n          test -f docs/08-release-notes.md\n          test -f docs/11-monorepo-architecture-diagram.md\n\n      - name: Verify env template\n        run: |\n          test -f .env.example\n          grep -q "DATABASE_URL" .env.example || echo "Warn: DATABASE_URL not documented"\n          grep -q "PLAID_CLIENT_ID" .env.example || echo "Warn: PLAID_CLIENT_ID not documented"\n\n      - name: Validate OpenAPI (basic)\n        run: |\n          python -m pip install --upgrade pip\n          python -m pip install openapi-spec-validator\n          python -m openapi_spec_validator docs/10-openapi.yaml\n\n      - name: Validate mobile shared TS types\n        working-directory: mobile-app\n        run: |\n          npm install -g typescript >/dev/null 2>&1 || true\n          if [ -f tsconfig.json ]; then\n            npx tsc --noEmit\n          else\n            echo "No tsconfig.json; skipping TS validation."\n          fi\n