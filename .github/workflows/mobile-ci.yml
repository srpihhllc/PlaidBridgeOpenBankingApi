name: Mobile App CI\n\non:\n  push:\n    branches: [ main, docs/infrastructure-upgrade ]\n    paths:\n      - "mobile-app/**"\n  pull_request:\n    branches: [ main, docs/infrastructure-upgrade ]\n    paths:\n      - "mobile-app/**"\n\njobs:\n  mobile-ci:\n    runs-on: ubuntu-latest\n\n    defaults:\n      run:\n        working-directory: mobile-app\n\n    steps:\n      - name: Checkout\n        uses: actions/checkout@v4\n\n      - name: Setup Node\n        uses: actions/setup-node@v4\n        with:\n          node-version: "20"\n          cache: "pnpm"\n\n      - name: Setup pnpm\n        uses: pnpm/action-setup@v4\n        with:\n          version: 9\n\n      - name: Install dependencies\n        run: pnpm install --frozen-lockfile\n\n      - name: Typecheck\n        run: pnpm run typecheck || pnpm run tsc --noEmit\n\n      - name: Lint\n        run: pnpm run lint || echo "No lint script; skipping."\n\n      - name: Run tests\n        run: pnpm test -- --watch=false || echo "No tests; skipping."\n\n      - name: Build (if configured)\n        run: pnpm run build || echo "No build script; skipping."\n