name: CI

on:
  push:
    branches: [ main, PlaidBridgeOpenBankingApi ]
  pull_request:
    branches: [ main, PlaidBridgeOpenBankingApi ]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        working-directory: PlaidBridgeOpenBankingApi
        run: |
          python -m pip install --upgrade pip
                    if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
          pip install pytest pip-audit bandit coverage

      - name: Run tests
        working-directory: PlaidBridgeOpenBankingApi
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379/0
          FLASK_CONFIG: testing
        run: |
          python -m pytest -q -vv

      - name: Run pip-audit
        working-directory: PlaidBridgeOpenBankingApi
        run: pip-audit --progress=off --format=columns || true

      - name: Run bandit
        working-directory: PlaidBridgeOpenBankingApi
        run: bandit -r . -x .venv -f json -o bandit-results.json || true

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-output
          path: PlaidBridgeOpenBankingApi/pytest_output.txt

