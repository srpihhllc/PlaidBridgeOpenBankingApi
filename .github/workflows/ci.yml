name: CI

on:
  push:
    branches: [ main, PlaidBridgeOpenBankingApi ]
  pull_request:
    branches: [ main, PlaidBridgeOpenBankingApi ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432

    env:
      # Ensure Python imports resolve from the package directory (single import root)
      PYTHONPATH: ${{ github.workspace }}/PlaidBridgeOpenBankingApi
      # Prevent create_app from running db.create_all() during test/migration runs
      ALEMBIC_RUNNING: "1"
      # Useful defaults for tests
      DATABASE_URL: postgresql://test:test@localhost:5432/test_db
      REDIS_URL: redis://localhost:6379/0
      FLASK_CONFIG: testing
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        working-directory: PlaidBridgeOpenBankingApi
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install --no-cache-dir -r requirements.txt
          else
            echo "requirements.txt not found"
          fi
          if [ -f requirements-dev.txt ]; then
            pip install --no-cache-dir -r requirements-dev.txt
          else
            echo "requirements-dev.txt not found"
          fi
          # Ensure minimal tools present so we get clearer errors if installs are missing
          python -m pip install --no-cache-dir -q pytest pip-audit bandit coverage || true

      - name: Verify installed packages
        working-directory: PlaidBridgeOpenBankingApi
        run: |
          set -euo pipefail
          echo "Python: $(which python)"
          echo "Pip:    $(which pip)"
          echo "Top installed packages:"
          pip list --format=columns | sed -n '1,200p'
          # quick import check for Flask
          python - <<'PY'
import importlib, sys
try:
    m = importlib.import_module('flask')
    print("flask OK:", getattr(m, "__version__", "unknown"))
except Exception as e:
    print("flask import failed:", type(e).__name__, e)
    sys.exit(2)
PY

      - name: Run tests
        working-directory: PlaidBridgeOpenBankingApi
        run: |
          set -euo pipefail
          python -m pytest -q -vv

      - name: Run pip-audit
        working-directory: PlaidBridgeOpenBankingApi
        run: pip-audit --progress=off --format=columns || true

      - name: Run bandit
        working-directory: PlaidBridgeOpenBankingApi
        run: bandit -r . -x .venv -f json -o bandit-results.json || true

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-output
          path: PlaidBridgeOpenBankingApi/pytest_output.txt
