# CI: create venv, run lint/tests, run alembic (safe), placeholder deploy
name: CI / Prepare & Deploy

on:
  push:
    branches:
      - main
      - PlaidBridgeOpenBankingApi
      - fix/*

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      # Ensure Python imports resolve to the repository root
      PYTHONPATH: ${{ github.workspace }}
      # Prevent create_app from calling db.create_all during migrations
      ALEMBIC_RUNNING: "1"
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.12"

    - name: Create and activate venv, upgrade pip
      run: |
        python -m venv .venv
        . .venv/bin/activate
        pip install --upgrade pip setuptools wheel

    - name: Install dependencies (requirements.txt if present, else minimal tooling)
      run: |
        . .venv/bin/activate
        if [ -f requirements.txt ]; then
          pip install -r requirements.txt
        else
          pip install ruff pytest alembic
        fi

    - name: Run ruff (lint)
      run: |
        . .venv/bin/activate
        pip install ruff
        ruff check app || true

    - name: Run tests (skip pytest-cov plugin to avoid coverage config/encoding issues)
      run: |
        . .venv/bin/activate
        python -m pytest -q -p no:pytest_cov

    - name: Run Alembic migrations (check only)
      run: |
        . .venv/bin/activate
        # ALEMBIC_RUNNING is set in job env to avoid create_all side-effects in create_app
        python -m alembic -c migrations/alembic.ini upgrade head || echo "alembic step failed or no DB access; check logs"

    - name: Placeholder deploy step
      if: always()
      run: |
        echo "Deploy step placeholder. Replace with your deploy commands (e.g., rsync, scp, kubectl, or cloud provider CLI)."
