name: Backend CI

on:
  push:
    branches: [ main, docs/infrastructure-upgrade ]
  pull_request:
    branches: [ main, docs/infrastructure-upgrade ]

jobs:
  backend-ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: plaidbridge
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    # NOTE: keep these defaults here so the job works out-of-the-box against the postgres service.
    # If your repo/application expects different env names (SQLALCHEMY_DATABASE_URI, DB_*, etc.)
    # we set them all so code paths that read either will see the DB.
    env:
      FLASK_ENV: testing
      PYTHONUNBUFFERED: "1"

      # Postgres service connection pieces (defaults used by the job's service)
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: localhost
      DB_PORT: "5432"
      DB_NAME: plaidbridge

      # Standardized connection strings for different code expectations.
      # These are constructed to point at the Postgres service above.
      # They can be overridden by repository or organization secrets if you need a different DB.
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@localhost:5432/plaidbridge
      SQLALCHEMY_DATABASE_URI: postgresql+psycopg2://postgres:postgres@localhost:5432/plaidbridge

      # If your app expects REDIS_URL but your .env uses REDIS_STORAGE_URI, map both.
      REDIS_STORAGE_URI: redis://localhost:6379/0
      REDIS_URL: redis://localhost:6379/0

      # Prevent create_app from calling db.create_all() during migrations
      ALEMBIC_RUNNING: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      # ... rest of the workflow unchanged ...
