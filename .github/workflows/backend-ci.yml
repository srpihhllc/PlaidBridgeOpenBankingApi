name: Backend CI\n\non:\n  push:\n    branches: [ main, docs/infrastructure-upgrade ]\n  pull_request:\n    branches: [ main, docs/infrastructure-upgrade ]\n\njobs:\n  backend-ci:\n    runs-on: ubuntu-latest\n\n    services:\n      postgres:\n        image: postgres:16\n        env:\n          POSTGRES_USER: postgres\n          POSTGRES_PASSWORD: postgres\n          POSTGRES_DB: plaidbridge\n        ports:\n          - 5432:5432\n        options: >-\n          --health-cmd="pg_isready -U postgres"\n          --health-interval=10s\n          --health-timeout=5s\n          --health-retries=5\n\n    env:\n      DATABASE_URL: postgresql+psycopg2://postgres:postgres@localhost:5432/plaidbridge\n      FLASK_ENV: testing\n      PYTHONUNBUFFERED: "1"\n\n    steps:\n      - name: Checkout\n        uses: actions/checkout@v4\n\n      - name: Setup Python\n        uses: actions/setup-python@v4\n        with:\n          python-version: "3.11"\n\n      - name: Install dependencies\n        run: |\n          python -m pip install --upgrade pip\n          if [ -f requirements.txt ]; then\n            pip install -r requirements.txt\n          else\n            pip install poetry\n            poetry install\n          fi\n\n      - name: Run migrations\n        run: |\n          if [ -f alembic.ini ]; then\n            poetry run alembic upgrade head || alembic upgrade head\n          fi\n\n      - name: Run tests\n        run: |\n          if command -v poetry >/dev/null 2>&1; then\n            poetry run pytest --maxfail=1 --disable-warnings -q\n          else\n            pytest --maxfail=1 --disable-warnings -q\n          fi\n\n      - name: Lint (ruff/flake8 if available)\n        run: |\n          if python -m pip show ruff >/dev/null 2>&1; then\n            ruff check .\n          elif python -m pip show flake8 >/dev/null 2>&1; then\n            flake8 .\n          else\n            echo "No linter installed; skipping."\n          fi\n