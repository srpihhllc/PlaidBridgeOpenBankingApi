# Backend CI: run tests against a Postgres service, run migrations, lint.
# Changes:
# - set PYTHONPATH to ${{ github.workspace }} so imports resolve from repo root (single import root)
# - set ALEMBIC_RUNNING=1 so create_app avoids side-effects (db.create_all) while running alembic
# - install both requirements.txt and requirements-dev.txt when present
# - prefer poetry when detected (keeps original behavior) but still install requirements files if present
# - run alembic via poetry when available or via python -m alembic otherwise
name: Backend CI

on:
  push:
    branches: [ main, docs/infrastructure-upgrade ]
  pull_request:
    branches: [ main, docs/infrastructure-upgrade ]

jobs:
  backend-ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: plaidbridge
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@localhost:5432/plaidbridge
      FLASK_ENV: testing
      PYTHONUNBUFFERED: "1"
      # Canonical import root for CI runs so Python doesn't import app under multiple roots
      PYTHONPATH: ${{ github.workspace }}
      # Prevent create_app from calling db.create_all() during migrations
      ALEMBIC_RUNNING: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          # Prefer requirements.txt if present
          if [ -f requirements.txt ]; then
            echo "Installing runtime requirements from requirements.txt"
            pip install --no-cache-dir -r requirements.txt
          else
            echo "requirements.txt not found"
          fi
          # Install dev/test requirements if present
          if [ -f requirements-dev.txt ]; then
            echo "Installing dev/test requirements from requirements-dev.txt"
            pip install --no-cache-dir -r requirements-dev.txt
          else
            echo "requirements-dev.txt not found"
          fi
          # If a pyproject/poetry workflow is used, install via poetry as a fallback
          if command -v poetry >/dev/null 2>&1; then
            echo "Poetry detected — running poetry install (no-interaction)"
            poetry install --no-interaction --no-ansi || true
          else
            echo "Poetry not detected (or poetry install failed)."
          fi
          # Minimal fallbacks to ensure tests can start in case pinned files are missing
          python -m pip install --no-cache-dir -q flask pytest || true

      - name: Run migrations
        env:
          # ensure alembic sees ALEMBIC_RUNNING if run in a subshell
          ALEMBIC_RUNNING: "1"
        run: |
          set -euo pipefail
          if [ -f alembic.ini ] || [ -d migrations ]; then
            echo "Running alembic upgrade head (safe-guarded by ALEMBIC_RUNNING)"
            if command -v poetry >/dev/null 2>&1; then
              poetry run alembic upgrade head || python -m alembic upgrade head || true
            else
              python -m alembic upgrade head || true
            fi
          else
            echo "No alembic configuration found; skipping migrations."
          fi

      - name: Run tests
        run: |
          set -euo pipefail
          # Use poetry if present, else run pytest directly
          if command -v poetry >/dev/null 2>&1; then
            echo "Running tests via poetry"
            poetry run pytest --maxfail=1 --disable-warnings -q
          else
            echo "Running tests via pytest"
            pytest --maxfail=1 --disable-warnings -q
          fi

      - name: Lint (ruff/flake8 if available)
        run: |
          set -euo pipefail
          if python -m pip show ruff >/dev/null 2>&1; then
            ruff check .
          elif python -m pip show flake8 >/dev/null 2>&1; then
            flake8 .
          else
            echo "No linter installed; skipping."
          fi
