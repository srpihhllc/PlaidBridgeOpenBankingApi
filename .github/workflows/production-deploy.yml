name: Production Deployment (Enterprise)

on:
  push:
    branches:
      - production  # Deploy from production branch
    tags:
      - 'v*.*.*'  # Deploy on version tags
  workflow_dispatch:  # Manual trigger
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '20'

jobs:
  # ========================================
  # Pre-deployment validation
  # ========================================
  validate:
    name: Pre-deployment Validation
    runs-on: ubuntu-latest
    outputs:
      backend-ok: ${{ steps.backend-check.outputs.ok }}
      mobile-ok: ${{ steps.mobile-check.outputs.ok }}
      version: ${{ steps.version.outputs.version }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for versioning

      - name: Extract version
        id: version
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
          else
            VERSION=$(git describe --tags --always --abbrev=7)
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Deploying version: $VERSION"

      - name: Check for secrets
        run: |
          echo "Validating required secrets are configured..."
          : ${{ secrets.SECRET_KEY }}
          : ${{ secrets.JWT_SECRET_KEY }}
          : ${{ secrets.DATABASE_URL }}
          : ${{ secrets.PLAID_CLIENT_ID }}
          : ${{ secrets.PLAID_SECRET }}
          : ${{ secrets.REDIS_URL }}
          echo "✅ All required secrets are configured"

      - name: Backend validation
        id: backend-check
        run: |
          python3 --version
          test -f PlaidBridgeOpenBankingApi/requirements.txt && echo "ok=true" >> $GITHUB_OUTPUT || (echo "❌ PlaidBridgeOpenBankingApi/requirements.txt missing" && exit 1)

      - name: Mobile validation
        id: mobile-check
        working-directory: mobile-app
        run: |
          test -f package.json && echo "ok=true" >> $GITHUB_OUTPUT || (echo "❌ package.json missing" && exit 1)

  # ========================================
  # Backend Build & Test
  # ========================================
  backend-build:
    name: Backend Build & Test
    runs-on: ubuntu-latest
    needs: validate
    defaults:
      run:
        working-directory: PlaidBridgeOpenBankingApi
    
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: plaidbridge_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@localhost:5432/plaidbridge_test
      FLASK_ENV: testing
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
      PLAID_CLIENT_ID: ${{ secrets.PLAID_CLIENT_ID }}
      PLAID_SECRET: ${{ secrets.PLAID_SECRET }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run database migrations
        run: |
          if [ -f alembic.ini ]; then
            alembic upgrade head
          fi

      - name: Run backend tests
        run: |
          pytest --maxfail=5 --disable-warnings -v --cov=app --cov-report=xml

      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          flags: backend
          name: backend-coverage

  # ========================================
  # Mobile App Build & Test
  # ========================================
  mobile-build:
    name: Mobile App Build & Test
    runs-on: ubuntu-latest
    needs: validate
    defaults:
      run:
        working-directory: mobile-app

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: mobile-app/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck || pnpm run tsc --noEmit

      - name: Lint
        run: pnpm run lint || echo "Linting completed with warnings"

      - name: Run tests
        run: pnpm test -- --watch=false --coverage || echo "Tests completed"

      - name: Build
        run: pnpm run build || echo "Build step not configured"

  # ========================================
  # Deploy to PythonAnywhere
  # ========================================
  deploy-pythonanywhere:
    name: Deploy to PythonAnywhere
    runs-on: ubuntu-latest
    needs: [backend-build, mobile-build]
    if: github.ref == 'refs/heads/production' || startsWith(github.ref, 'refs/tags/v')
    environment:
      name: production-pythonanywhere
      url: https://srpihhllc.pythonanywhere.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to PythonAnywhere via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ssh.pythonanywhere.com
          username: ${{ secrets.PYTHONANYWHERE_USERNAME }}
          password: ${{ secrets.PYTHONANYWHERE_PASSWORD }}
          script: |
            cd ~/PlaidBridgeOpenBankingApi
            git fetch origin
            git checkout production
            git pull origin production
            source ~/.virtualenvs/myenv/bin/activate
            pip install -r requirements.txt --upgrade
            python manage.py migrate || alembic upgrade head
            touch /var/www/srpihhllc_pythonanywhere_com_wsgi.py

      - name: Verify deployment
        run: |
          echo "Waiting for application to restart..."
          sleep 10
          curl -f https://srpihhllc.pythonanywhere.com/health || echo "Health check endpoint not available"

  # ========================================
  # Post-deployment verification
  # ========================================
  verify-deployment:
    name: Post-Deployment Verification
    runs-on: ubuntu-latest
    needs: [deploy-pythonanywhere]
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run smoke tests
        run: |
          echo "Running post-deployment smoke tests..."
          
          # Test PythonAnywhere
          if [ "${{ needs.deploy-pythonanywhere.result }}" == "success" ]; then
            curl -f -s -o /dev/null -w "%{http_code}" https://srpihhllc.pythonanywhere.com/ && echo "✅ PythonAnywhere responding" || echo "⚠️  PythonAnywhere not responding"
          fi
          
      - name: Send deployment notification
        if: always()
        uses: actions/github-script@v6
        with:
          script: |
            const deploymentStatus = {
              pythonanywhere: '${{ needs.deploy-pythonanywhere.result }}',
              azure: 'skipped',
              version: '${{ needs.validate.outputs.version }}'
            };
            
            console.log('Deployment Status:', deploymentStatus);
            
            // You can extend this to send Slack/Teams/Email notifications
            // or update a status dashboard
