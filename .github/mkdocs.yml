site_name: Financial Powerhouse Platform
site_description: Unified fintech monorepo documentation
site_author: SRPIH LLC

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - content.code.copy
    - toc.integrate
    - search.suggest
    - search.highlight

nav:
  - Overview: v1/01-system-architecture.md
  - Backend Architecture: v1/03-backend-architecture.md
  - Mobile Architecture: v1/12-mobile-architecture.md
  - Database ERD: v1/04-database-erd.md
  - Developer Onboarding: v1/05-developer-onboarding.md
  - CI/CD Pipeline: v1/06-ci-cd-pipeline.md
  - Operator Handbook: v1/07-operator-handbook.md
  - Release Notes: v1/08-release-notes.md
  - API Reference: v1/09-api-reference.md
  - OpenAPI Spec: v1/10-openapi.yaml
  - Monorepo Architecture Diagram: v1/11-monorepo-architecture-diagram.md

markdown_extensions:
  - admonition
  - codehilite
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.tabbed

plugins:
  - search
  - mkdocstrings:
      default_handler: python

extra_css:
  - stylesheets/extra.css
