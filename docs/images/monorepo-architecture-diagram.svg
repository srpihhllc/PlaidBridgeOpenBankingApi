<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="400" viewBox="0 0 1200 400" role="img" aria-label="Monorepo architecture diagram placeholder">
  <rect width="100%" height="100%" fill="#ffffff"/>
  <g font-family="Arial, Helvetica, sans-serif" fill="#333">
    <rect x="40" y="40" width="240" height="80" rx="8" fill="#e6f0ff" stroke="#7aa2ff"/>
    <text x="160" y="85" font-size="14" text-anchor="middle">Mobile App</text>

    <rect x="340" y="40" width="240" height="80" rx="8" fill="#f0fff0" stroke="#7fff9a"/>
    <text x="460" y="85" font-size="14" text-anchor="middle">TRPC Server</text>

    <rect x="640" y="40" width="240" height="80" rx="8" fill="#fff6e6" stroke="#ffbd59"/>
    <text x="760" y="85" font-size="14" text-anchor="middle">Flask Backend</text>

    <rect x="340" y="160" width="240" height="60" rx="6" fill="#f7f7f7" stroke="#cccccc"/>
    <text x="460" y="195" font-size="12" text-anchor="middle">PostgreSQL</text>

    <rect x="640" y="160" width="240" height="60" rx="6" fill="#f7f7f7" stroke="#cccccc"/>
    <text x="760" y="195" font-size="12" text-anchor="middle">Redis</text>

    <line x1="280" y1="80" x2="340" y2="80" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="580" y1="80" x2="640" y2="80" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="460" y1="120" x2="460" y2="160" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="760" y1="120" x2="760" y2="160" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>

    <defs>
      <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
        <path d="M0,0 L10,5 L0,10 z" fill="#666" />
      </marker>
    </defs>

    <text x="60" y="360" font-size="11" fill="#999">Placeholder diagram — replace with full SVG export at docs/images/monorepo-architecture-diagram.svg</text>
  </g>
</svg>
