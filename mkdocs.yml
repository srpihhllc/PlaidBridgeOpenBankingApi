site_name: Financial Powerhouse Platform
site_description: Unified fintech monorepo documentation
theme:
  name: material
  custom_dir: docs/
  features:
    - navigation.tabs
    - navigation.sections
    - content.code.copy

extra_css:
  - theme_overrides.css

markdown_extensions:
  - admonition
  - codehilite
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.tabbed

plugins:
  - search
  - mkdocstrings:
      default_handler: python

nav:
  - Naming Conventions: 02-naming-conventions.md
  - Home: index.md
  - System Architecture: docs/01-system-architecture.md
  - Platform Overview: docs/02-platform-overview.md
  - Backend Architecture: docs/03-backend-architecture.md
  - Database ERD: docs/04-database-erd.md
  - Developer Onboarding: docs/05-developer-onboarding.md
  - CI/CD Pipeline: docs/06-ci-cd-pipeline.md
  - Operator Handbook: docs/07-operator-handbook.md
  - Release Notes: docs/08-release-notes.md
  - API Reference: docs/09-api-reference.md
  - OpenAPI Spec: docs/10-openapi.yaml
  - Architecture Diagram: docs/11-monorepo-architecture-diagram.md
  - Contributing: CONTRIBUTING.md
  - Changelog: CHANGELOG.md
