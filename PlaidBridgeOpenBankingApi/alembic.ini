# =============================================================================
# Alembic configuration for database migrations
# =============================================================================
# This file controls Alembic’s behavior:
#   - Migration script location
#   - Logging configuration
#   - (NOT the database URL — that is handled in migrations/env.py)
# =============================================================================

[alembic]
# Path to your migrations folder
script_location = %(here)s/migrations

# IMPORTANT:
# Do NOT put your database URL here.
# Alembic.ini cannot safely store passwords containing %, $, @, or URL-encoded values.
# The real SQLAlchemy URL is loaded from your Flask app inside migrations/env.py.
sqlalchemy.url =

# Template used to generate migration filenames
# file_template = %%(rev)s_%%(slug)s

# Run the environment during 'revision' command (default: false)
# revision_environment = false


# =============================================================================
# Logging configuration
# =============================================================================

[loggers]
keys = root, sqlalchemy, alembic, flask_migrate, app, redis

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[logger_flask_migrate]
level = INFO
handlers =
qualname = flask_migrate

[logger_app]
level = WARN
handlers =
qualname = app

[logger_redis]
level = ERROR
handlers =
qualname = app.utils.redis_utils

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
