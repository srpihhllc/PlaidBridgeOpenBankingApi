# =============================================================================
# FILE: pytest.ini
# DESCRIPTION: Central pytest configuration for PlaidBridgeOpenBankingApi
# =============================================================================

[pytest]
# Runtime options
addopts = -ra -q --disable-warnings --maxfail=1 --strict-markers --cov=app --cov-report=term-missing --cov-fail-under=40

# ✅ Load early Redis stub plugin BEFORE conftest.py
plugins = app.tests.pytest_plugins

# Discover tests under app/tests
testpaths =
    app/tests

# Collect any file named test_*.py or *_test.py
python_files =
    test_*.py
    *_test.py

# Skip these dirs entirely
norecursedirs =
    app/cli
    backup
    venv
    .git
    .pytest_cache
    azure-functions-core-tools

# Declare all custom markers used in the suite
markers =
    migrations: mark tests that require Alembic migrations
    google: mark tests that require Google OAuth keys
    microsoft: mark tests that require Microsoft OAuth keys
    plaid: mark tests that require Plaid OAuth keys
    ci: mark tests intended for CI pipelines
    nightly: mark long-running or stress tests for nightly runs
    smoketest: quick lifecycle validation (admin seed, login, logout)
    auth: authentication-related tests (login, logout, MFA, etc.)
    migration_backed: tests that require DB migrations to be applied
    redis: marks tests that require live Redis connectivity
    providers: marks all OAuth/OpenBanking provider tests
    infra: marks infrastructure-related tests such as migrations, connection checks, telemetry













