{% extends "base.html" %}

{% block content %}
<h2>Grant Decision Dashboard</h2>

<object data="{{ url_for('static', filename='docs/fintech-orchestration-v2.drawio.svg') }}"
        type="image/svg+xml" width="100%" height="900px">
</object>

{% for org_id, meta in highlights.items() %}
  <div class="highlight-callout">
    <strong>{{ org_id }}</strong> → Score: {{ meta['grant_score'] }}
    <br>Last Evaluated: {{ meta['timestamp'] }}
  </div>
{% endfor %}
{% endblock %}
