name: Provider Test Suites

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: "0 3 * * *"   # Optional: run nightly suite at 3 AM UTC

jobs:
  ci-tests:
    name: Core CI Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install poetry
          poetry install

      - name: Run CI marker tests
        run: poetry run pytest -m ci

  oauth-tests:
    name: ${{ matrix.provider }} OAuth Tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        provider: [google, microsoft, plaid]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install poetry
          poetry install

      - name: Run ${{ matrix.provider }} tests
        run: poetry run pytest -m ${{ matrix.provider }}

  nightly-tests:
    if: github.event_name == 'schedule'
    name: Nightly Stress/Soak Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install poetry
          poetry install

      - name: Run nightly marker tests
        run: poetry run pytest -m nightly


