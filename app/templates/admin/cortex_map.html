{% extends "base.html" %}
{% block title %}Cortex Map | FinBrain{% endblock %}

{% block content %}
<div class="container mt-4">

  <!-- 🛠️ Cortex Header with Self-Repair Button -->
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h2>🧠 FinBrain Cortex Map</h2>
    <form action="{{ url_for('debug.self_repair') }}" method="POST">
      <button type="submit" class="btn btn-warning">
        🛠️ Initiate Self-Repair
      </button>
    </form>
  </div>

  <div class="row">
    {% for node in cortex %}
      <div class="col-md-4 mb-3">
        <div class="card border-info">
          <div class="card-header bg-info text-white">
            {{ node.endpoint }}
          </div>
          <div class="card-body">
            <p><strong>Hits:</strong> {{ node.hits }}</p>
            <p><strong>Last Accessed:</strong> {{ node.last_accessed or "Never" }}</p>
            <div class="progress">
              <div class="progress-bar bg-success" role="progressbar"
                   style="width: {{ node.hits * 2 }}%; max-width: 100%;">
                {{ node.hits }}
              </div>
            </div>
          </div>
        </div>
      </div>
    {% endfor %}
  </div>
</div>
{% endblock %}
