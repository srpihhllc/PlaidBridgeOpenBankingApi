<div class="tile login-trace">
  <h3>🔐 Login Activity</h3>
  <div id="login-status">
    <p><strong>User:</strong> {{ user_email }}</p>
    <p><strong>Status:</strong> {{ status }}</p>
    <p><strongMFA:</strong> {{ mfa_status }}</p>
    <p><strong>Timestamp:</strong> {{ timestamp }}</p>
  </div>
  <span class="ttl-pill">TTL: {{ ttl_remaining }}s</span>
</div>
