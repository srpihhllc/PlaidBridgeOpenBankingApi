<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Invalid Date</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 p-8 min-h-screen">

<div class="max-w-lg mx-auto bg-white rounded-xl shadow-lg p-6">

    <!-- Header -->
    <header class="pb-4 mb-6 border-b border-gray-200">
        <h1 class="text-2xl font-bold text-gray-800">Invalid Date</h1>
    </header>

    <p class="text-gray-700 mb-4">
        The date <span class="font-semibold text-red-600">{{ date_str }}</span> is not a valid format.
    </p>

    <p class="text-gray-600 mb-6">
        Expected format: <code class="bg-gray-200 px-1 py-0.5 rounded text-sm">YYYY‑MM‑DD</code>
    </p>

    <div class="flex space-x-3">
        <a href="/cockpit/tiles/lender_risk/heatmap"
           class="bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2 px-4 rounded-lg shadow">
            Back to Heatmap
        </a>

        <a href="/cockpit/tiles/lender_risk/"
           class="bg-gray-200 hover:bg-gray-300 text-gray-800 font-semibold py-2 px-4 rounded-lg shadow">
            Back to Lender Risk Tile
        </a>
    </div>

</div>

</body>
</html>
